<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据展示表格</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }
        
        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
        }
        
        body {
            background-color: #f5f7fa;
            color: #333;
            padding: 0;
            line-height: 0.95;
            font-size: 10px;
        }
        
        .container {
            height: 100%;
            width: 100%;
            background: white;
            display: flex;
            flex-direction: column;
        }
        
        header {
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            color: white;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        
        h1 {
            font-size: 1.8em;
            font-weight: 600;
        }
        
        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .filter-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .filter-select {
            padding: 5px 10px;
            border: none;
            border-radius: 15px;
            font-size: 1em;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            min-width: 150px;
        }
        
        .filter-select option {
            background: white;
            color: #333;
        }
        
        .search-box {
            position: relative;
        }
        
        .search-box input {
            padding: 5px 10px 5px 25px;
            border: none;
            border-radius: 15px;
            width: 200px;
            font-size: 1em;
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }
        
        .search-box input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }
        
        .search-box i {
            position: absolute;
            left: 8px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.7);
        }
        
        .refresh-btn {
            padding: 5px 10px;
            border: none;
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            cursor: pointer;
            font-size: 1em;
            transition: background 0.3s;
        }
        
        .refresh-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        
        .table-container {
            flex: 1;
            overflow: auto;
            padding: 10px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 1200px;
            table-layout: fixed;
        }
        
        /* 第一列（时间列）宽度缩小 */
        th:first-child,
        td:first-child {
            width: 50px;
            min-width: 50px;
            max-width: 50px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        th {
            background-color: #f8f9fa;
            padding: 8px 10px;
            text-align: left;
            font-weight: 600;
            color: #495057;
            border-bottom: 2px solid #e9ecef;
            cursor: pointer;
            user-select: none;
            position: relative;
            font-size: 1.1em;
        }
        
        th.sortable:hover {
            background-color: #e9ecef;
        }
        
        th i {
            margin-left: 3px;
            color: #6c757d;
        }
        
        td {
            padding: 8px 10px;
            border-bottom: 1px solid #e9ecef;
            vertical-align: top;
            font-size: 1em;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        tr:hover {
            background-color: #f8f9fa;
        }
        
        .highlight {
            background-color: #fff3cd;
            font-weight: 600;
            padding: 1px 3px;
            border-radius: 2px;
        }
        
        .list-item {
            margin-bottom: 3px;
            padding: 2px 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .list-item:last-child {
            margin-bottom: 0;
        }
        
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            flex-direction: column;
            gap: 10px;
            flex: 1;
        }
        
        .spinner {
            width: 30px;
            height: 30px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .error {
            background-color: #f8d7da;
            color: #721c24;
            padding: 10px;
            border-radius: 5px;
            margin: 10px;
            display: none;
            font-size: 1.1em;
        }
        
        .pagination {
            display: flex;
            justify-content: center;
            padding: 10px;
            gap: 8px;
            flex-shrink: 0;
        }
        
        .pagination button {
            padding: 5px 10px;
            border: 1px solid #dee2e6;
            background: white;
            border-radius: 3px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1em;
        }
        
        .pagination button:hover:not(:disabled) {
            background: #e9ecef;
        }
        
        .pagination button.active {
            background: #007bff;
            color: white;
            border-color: #007bff;
        }
        
        .pagination button:disabled {
            cursor: not-allowed;
            opacity: 0.6;
        }
        
        .footer {
            text-align: center;
            padding: 8px;
            color: #6c757d;
            font-size: 1em;
            border-top: 1px solid #e9ecef;
            flex-shrink: 0;
        }
        
        .search-link {
            color: #007bff;
            text-decoration: none;
            cursor: pointer;
            transition: color 0.2s;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            display: inline-block;
            max-width: 100%;
        }
        
        .search-link:hover {
            color: #0056b3;
            text-decoration: underline;
        }
        
        /* 调整其他列的宽度分配 */
        th:nth-child(2), td:nth-child(2) { width: 40px; } /* 类型 */
        th:nth-child(3), td:nth-child(3) { width: 50px; } /* 搜索词 */
        th:nth-child(4), td:nth-child(4) { width: 30px; } /* count */
        th:nth-child(5), td:nth-child(5) { width: 60px; } /* 分值 */
        th:nth-child(6), td:nth-child(6) { width: 210px; } /* 名称 */
        th:nth-child(7), td:nth-child(7) { width: 170px; } /* hitreason */
        th:nth-child(8), td:nth-child(8) { width: 30px; } /* count */
        th:nth-child(9), td:nth-child(9) { width: 50px; } /* 分值 */
        th:nth-child(10), td:nth-child(10) { width: 210px; } /* 名称 */
        th:nth-child(11), td:nth-child(11) { width: 170px; } /* hitreason */
        th:nth-child(12), td:nth-child(12) { width: 35px; } /* 比较 */
        
        @media (max-width: 768px) {
            header {
                flex-direction: column;
                gap: 8px;
            }
            
            .controls {
                flex-direction: column;
                width: 100%;
            }
            
            .filter-group, .search-box {
                width: 100%;
            }
            
            .search-box input {
                width: 100%;
            }
            
            .table-container {
                padding: 5px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>数据展示表格</h1>
            <div class="controls">
                <div class="filter-group">
                    <select id="tidFilter" class="filter-select">
                        <option value="">加载中...</option>
                    </select>
                    <select id="typeFilter" class="filter-select" disabled>
                        <option value="">请先选择TID</option>
                    </select>
                </div>
                <div class="search-box">
                    <i>🔍</i>
                    <input type="text" id="searchInput" placeholder="搜索...">
                </div>
                <button id="refreshBtn" class="refresh-btn">刷新数据</button>
            </div>
        </header>
        
        <div id="error-message" class="error"></div>
        
        <div class="table-container">
            <table id="dataTable">
                <thead>
                    <tr>
                        <th class="sortable" data-sort="time">TID<i>↕</i></th>
                        <th>类型</th>
                        <th>搜索词</th>
                        <th>count</th>
                        <th>分值</th>
                        <th>名称</th>
                        <th>hitreason</th>
                        <th>count</th>
                        <th>分值</th>
                        <th>名称</th>
                        <th>hitreason</th>
                        <th class="sortable" data-sort="compare_name">比较<i></i></th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <!-- 数据将通过JavaScript动态填充 -->
                </tbody>
            </table>
        </div>
        
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <div>正在加载数据，请稍候...</div>
        </div>
        
        <div class="pagination">
            <button id="prevBtn" disabled>上一页</button>
            <span id="pageInfo">第 1 页，共 1 页</span>
            <button id="nextBtn" disabled>下一页</button>
        </div>
        
        <div class="footer">
            <p>数据最后更新时间: <span id="lastUpdateTime">-</span></p>
        </div>
    </div>

    <script>
        // 配置
        const CONFIG = {
            TID_LIST_API: 'http://127.0.0.1:8000/api/m_search_list/tid',
            SEARCH_LIST_API_BASE: 'http://127.0.0.1:8000/api/m_search_list/',
            TYPE_BY_TID_API: 'http://127.0.0.1:8000/api/m_search_list/type_by_tid',
            ITEMS_PER_PAGE: 10,
            SEARCH_BASE_URL: 'https://web.greatld.com/web/search?key='
        };

        // 全局变量
        let currentData = [];
        let filteredData = [];
        let currentPage = 1;
        let sortColumn = 'time';
        let sortDirection = 'desc';
        let currentTID = '';
        let currentType = '';

        // DOM 元素
        const tableBody = document.getElementById('tableBody');
        const loadingElement = document.getElementById('loading');
        const errorElement = document.getElementById('error-message');
        const searchInput = document.getElementById('searchInput');
        const refreshBtn = document.getElementById('refreshBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const pageInfo = document.getElementById('pageInfo');
        const lastUpdateTime = document.getElementById('lastUpdateTime');
        const tidFilter = document.getElementById('tidFilter');
        const typeFilter = document.getElementById('typeFilter');

        // 显示加载状态
        function showLoading() {
            loadingElement.style.display = 'flex';
            tableBody.innerHTML = '';
        }

        // 隐藏加载状态
        function hideLoading() {
            loadingElement.style.display = 'none';
        }

        // 显示错误
        function showError(message) {
            errorElement.textContent = message;
            errorElement.style.display = 'block';
        }

        // 隐藏错误
        function hideError() {
            errorElement.style.display = 'none';
        }

        // 处理数据格式
        function processData(data) {
            if (!Array.isArray(data)) {
                console.warn('数据不是数组格式:', data);
                return [];
            }

            return data.map(item => {
                // 处理列表字段
                const listFields = ['apiscore', 'name', 'hitreason', 'apiscore_online', 'name_online', 'hitreason_online'];
                
                listFields.forEach(field => {
                    if (item[field] !== undefined && item[field] !== null) {
                        if (typeof item[field] === 'string') {
                            try {
                                // 尝试解析JSON字符串
                                item[field] = JSON.parse(item[field]);
                            } catch (e) {
                                // 如果解析失败，尝试手动解析不完整的JSON
                                console.warn(`解析${field}字段失败:`, e);
                                try {
                                    // 尝试修复不完整的JSON（如示例中的count字段）
                                    const fixedJson = item[field].replace(/,+$/, '') + ']';
                                    item[field] = JSON.parse(fixedJson);
                                } catch (e2) {
                                    // 如果还是失败，将其转换为单元素数组
                                    console.warn(`修复${field}字段失败:`, e2);
                                    item[field] = [item[field]];
                                }
                            }
                        }
                        // 确保是数组
                        if (!Array.isArray(item[field])) {
                            item[field] = [item[field]];
                        }
                    } else {
                        item[field] = [];
                    }
                });
                
                return item;
            });
        }

        // 渲染表格
        function renderTable() {
            const startIndex = (currentPage - 1) * CONFIG.ITEMS_PER_PAGE;
            const endIndex = startIndex + CONFIG.ITEMS_PER_PAGE;
            const pageData = filteredData.slice(startIndex, endIndex);
            
            if (pageData.length === 0) {
                tableBody.innerHTML = `
                    <tr>
                        <td colspan="10" style="text-align: center; padding: 20px;">
                            ${filteredData.length === 0 ? '没有找到匹配的数据' : '暂无数据'}
                        </td>
                    </tr>
                `;
                return;
            }
            
            let html = '';
            
            pageData.forEach(item => {
                html += `
                    <tr>
                        <td title="${item.TID || '-'}">${item.TID || '-'}</td>
                        <td title="${item.type || '-'}">${item.type_desc || '-'}</td>
                        <td>${renderSearchKey(item.searchkey)}</td>
                        <td title="${item.count || '-'}">${item.count || '-'}</td>
                        <td>${renderListField(item.apiscore)}</td>
                        <td>${renderListFieldWithHighlight(item.name)}</td>
                        <td>${renderListFieldWithHighlight(item.hitreason)}</td>
                        <td title="${item.count_online || '-'}">${item.count_online || '-'}</td>
                        <td>${renderListField(item.apiscore_online)}</td>
                        <td>${renderListFieldWithHighlight(item.name_online)}</td>
                        <td>${renderListFieldWithHighlight(item.hitreason_online)}</td>
                        <td title="${item.compare_name || '-'}">${item.compare_name || '-'}</td>
                    </tr>
                `;
            });
            
            tableBody.innerHTML = html;
            
            // 更新分页信息
            updatePagination();
        }

        // 渲染搜索关键词（添加链接）
        function renderSearchKey(searchkey) {
            if (!searchkey) {
                return '-';
            }
            
            const encodedKey = encodeURIComponent(searchkey);
            const url = `${CONFIG.SEARCH_BASE_URL}${encodedKey}`;
            
            return `<a href="${url}" target="_blank" class="search-link" title="${searchkey}">${searchkey}</a>`;
        }

        // 渲染列表字段（普通文本）
        function renderListField(list) {
            if (!Array.isArray(list) || list.length === 0) {
                return '-';
            }
            
            return list.map(item => {
                if (item === null || item === undefined) return '-';
                // 如果是0，直接显示0
                if (item === 0) return '0';
                return `<div class="list-item" title="${item}">${item}</div>`;
            }).join('');
        }

        // 渲染列表字段（带高亮）
        function renderListFieldWithHighlight(list) {
            if (!Array.isArray(list) || list.length === 0) {
                return '-';
            }
            
            return list.map(item => {
                if (item === null || item === undefined) return '-';
                // 如果是0，直接显示0
                if (item === 0) return '0';
                return `<div class="list-item" title="${item}">${renderHighlightedText(item)}</div>`;
            }).join('');
        }

        // 渲染高亮文本（处理<em>标签）
        function renderHighlightedText(text) {
            if (typeof text !== 'string') return text;
            
            // 将<em>标签替换为带高亮样式的span
            return text.replace(/<em>(.*?)<\/em>/g, '<span class="highlight">$1</span>');
        }

        // 格式化时间
        function formatTime(timeString) {
            if (!timeString) return '-';
            
            try {
                // 处理格式为 "20251118225723" 的时间字符串
                if (/^\d{14}$/.test(timeString)) {
                    const year = timeString.substring(0, 4);
                    const month = timeString.substring(4, 6);
                    const day = timeString.substring(6, 8);
                    const hour = timeString.substring(8, 10);
                    const minute = timeString.substring(10, 12);
                    const second = timeString.substring(12, 14);
                    
                    return `${year}-${month}-${day} ${hour}:${minute}:${second}`;
                }
                
                // 尝试作为标准日期字符串解析
                const date = new Date(timeString);
                return date.toLocaleString('zh-CN');
            } catch (e) {
                return timeString;
            }
        }

        // 更新分页信息
        function updatePagination() {
            const totalPages = Math.ceil(filteredData.length / CONFIG.ITEMS_PER_PAGE);
            
            pageInfo.textContent = `第 ${currentPage} 页，共 ${totalPages} 页`;
            prevBtn.disabled = currentPage <= 1;
            nextBtn.disabled = currentPage >= totalPages;
        }

        // 排序数据
        function sortData() {
            filteredData.sort((a, b) => {
                let aValue = a[sortColumn];
                let bValue = b[sortColumn];
                
                // 处理时间排序
                if (sortColumn === 'time') {
                    aValue = new Date(aValue || 0);
                    bValue = new Date(bValue || 0);
                }
                
                // 处理比较名称排序
                if (sortColumn === 'compare_name') {
                    aValue = aValue || '';
                    bValue = bValue || '';
                }
                
                if (aValue < bValue) return sortDirection === 'asc' ? -1 : 1;
                if (aValue > bValue) return sortDirection === 'asc' ? 1 : -1;
                return 0;
            });
            
            renderTable();
        }

        // 过滤数据（搜索功能）
        function filterData() {
            const searchTerm = searchInput.value.toLowerCase().trim();
            
            if (!searchTerm) {
                filteredData = [...currentData];
            } else {
                filteredData = currentData.filter(item => {
                    // 搜索所有文本字段
                    const searchableFields = [
                        item.TID,
                        item.type,
                        item.searchkey,
                        item.compare_name,
                        ...(item.name || []),
                        ...(item.hitreason || []),
                        ...(item.name_online || []),
                        ...(item.hitreason_online || [])
                    ];
                    
                    return searchableFields.some(field => 
                        field && field.toString().toLowerCase().includes(searchTerm)
                    );
                });
            }
            
            currentPage = 1;
            sortData();
        }

        // 获取TID列表
        async function fetchTIDList() {
            try {
                const response = await fetch(CONFIG.TID_LIST_API);
                
                if (!response.ok) {
                    throw new Error(`HTTP错误! 状态码: ${response.status}`);
                }
                
                const result = await response.json();
                
                // 检查API返回状态
                if (result.code !== 200) {
                    throw new Error(`API错误: ${result.message}`);
                }
                
                // 填充下拉框
                const tidOptions = result.data.map(item => `<option value="${item.TID}">${item.TID}</option>`).join('');
                tidFilter.innerHTML = `<option value="">请选择</option>${tidOptions}`;
                
                // 默认选择第一个TID
                if (result.data.length > 0) {
                    currentTID = result.data[0].TID;
                    tidFilter.value = currentTID;
                    // 加载对应的类型列表
                    fetchTypeList(currentTID);
                    // 加载数据
                    fetchData(currentTID);
                }
                
            } catch (error) {
                console.error('获取TID列表失败:', error);
                showError(`TID列表加载失败: ${error.message}`);
                tidFilter.innerHTML = '<option value="">加载失败</option>';
            }
        }

        // 获取类型列表
        async function fetchTypeList(tid) {
            try {
                typeFilter.disabled = true;
                typeFilter.innerHTML = '<option value="">加载中...</option>';
                
                const response = await fetch(`${CONFIG.TYPE_BY_TID_API}?tid=${tid}`);
                
                if (!response.ok) {
                    throw new Error(`HTTP错误! 状态码: ${response.status}`);
                }
                
                const result = await response.json();
                
                // 检查API返回状态
                if (result.code !== 200) {
                    throw new Error(`API错误: ${result.message}`);
                }
                
                const data = result.data;
                let typeOptions = '<option value="">全部类型</option>';
                
                // 检查是否有类型数据
                if (data.types && data.types.length > 0) {
                    for (let i = 0; i < data.types.length; i++) {
                        const type = data.types[i];
                        const typeDesc = data.type_desc && data.type_desc[i] ? data.type_desc[i] : type;
                        typeOptions += `<option value="${type}">${typeDesc}</option>`;
                    }
                }
                
                typeFilter.innerHTML = typeOptions;
                typeFilter.disabled = false;
                
            } catch (error) {
                console.error('获取类型列表失败:', error);
                typeFilter.innerHTML = '<option value="">加载失败</option>';
            }
        }

        // 从API获取数据
        async function fetchData(tid = '', type = '') {
            try {
                showLoading();
                hideError();
                
                let apiUrl = `${CONFIG.SEARCH_LIST_API_BASE}${tid}`;
                
                // 如果有类型筛选，添加到URL参数
                if (type) {
                    apiUrl += `?type=${encodeURIComponent(type)}`;
                }
                
                const response = await fetch(apiUrl);
                
                if (!response.ok) {
                    throw new Error(`HTTP错误! 状态码: ${response.status}`);
                }
                
                const result = await response.json();
                
                // 检查API返回状态
                if (result.code !== 200) {
                    throw new Error(`API错误: ${result.message}`);
                }
                
                // 使用返回的data字段
                currentData = processData(result.data);
                filteredData = [...currentData];
                
                // 设置最后更新时间
                lastUpdateTime.textContent = new Date().toLocaleString('zh-CN');
                
                // 排序并渲染
                sortData();
                
            } catch (error) {
                console.error('获取数据失败:', error);
                showError(`数据加载失败: ${error.message}`);
                currentData = [];
                filteredData = [];
                renderTable();
            } finally {
                hideLoading();
            }
        }

        // 初始化
        function init() {
            // 添加事件监听器
            tidFilter.addEventListener('change', (e) => {
                currentTID = e.target.value;
                if (currentTID) {
                    // 重置类型筛选
                    currentType = '';
                    typeFilter.value = '';
                    // 加载类型列表
                    fetchTypeList(currentTID);
                    // 加载数据
                    fetchData(currentTID);
                } else {
                    // 如果选择了"全部TID"，清空表格
                    currentData = [];
                    filteredData = [];
                    typeFilter.disabled = true;
                    typeFilter.innerHTML = '<option value="">请先选择TID</option>';
                    renderTable();
                }
            });
            
            typeFilter.addEventListener('change', (e) => {
                currentType = e.target.value;
                if (currentTID) {
                    fetchData(currentTID, currentType);
                }
            });
            
            searchInput.addEventListener('input', filterData);
            refreshBtn.addEventListener('click', () => {
                if (currentTID) {
                    fetchData(currentTID, currentType);
                } else {
                    fetchTIDList();
                }
            });
            prevBtn.addEventListener('click', () => {
                if (currentPage > 1) {
                    currentPage--;
                    renderTable();
                }
            });
            nextBtn.addEventListener('click', () => {
                const totalPages = Math.ceil(filteredData.length / CONFIG.ITEMS_PER_PAGE);
                if (currentPage < totalPages) {
                    currentPage++;
                    renderTable();
                }
            });
            
            // 添加排序功能
            document.querySelectorAll('.sortable').forEach(th => {
                th.addEventListener('click', () => {
                    const column = th.dataset.sort;
                    
                    if (sortColumn === column) {
                        // 切换排序方向
                        sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
                    } else {
                        // 新列，默认降序
                        sortColumn = column;
                        sortDirection = 'desc';
                    }
                    
                    // 更新表头指示器
                    document.querySelectorAll('.sortable i').forEach(icon => {
                        icon.textContent = '↕';
                    });
                    th.querySelector('i').textContent = sortDirection === 'asc' ? '↑' : '↓';
                    
                    sortData();
                });
            });
            
            // 初始加载TID列表
            fetchTIDList();
        }

        // 页面加载完成后执行
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
