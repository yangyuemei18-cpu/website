<body>

        <section class="search-section">

                           value='{"x-request-strategy-custom-ab-hk-search-code": "EXPERIMENT_A","x-request-strategy-custom-ab-search-group-code": "EXPERIMENT_A"}'>

        <script>

        <section class="results-section">
            <div class="results-container">
                <div class="result-panel">
                    <div class="panel-header api1">
                        <div class="panel-title">
                            <i class="fas fa-database"></i> 测试接口结果

                <div class="result-panel">
                    <div class="panel-header api2">

                        </div>

                        </div>
                    </div>
                    <div class="table-container" id="resultsTable2">
                        <div class="empty-state">

        <footer>

    <div id="notification" class="notification"></div>

    <script>
        // ==================== 配置与工具函数 ====================
// <!--        const DEFAULT_API_CONFIG = {-->
// <!--            url1: 'http://nodejs-qcc-backend-data.sit.office.greatld.com/api/ECILocal/SearchMultiSelection?ignoreCache=true',-->
// <!--            url2: 'http://nodejs-qcc-backend-data.prod.office.greatld.com/api/ECILocal/SearchMultiSelection?ignoreCache=true'-->
// <!--        };-->
        const DEFAULT_API_CONFIG = {
                url1: '/api/search-sit?ignoreCache=true',
                url2: '/api/search-prod?ignoreCache=true'
              };
        const SECRET_KEY = 'e7e3096d-7dd0-4ddd-98d3-0b2b77996f6e';
        
        // DOM 元素
        const searchBtn = document.getElementById('searchBtn');
        const saveBtn = document.getElementById('saveBtn');
        const searchTermInput = document.getElementById('searchTerm');
        const extraParams1Input = document.getElementById('extraParams1');
        const extraParams2Input = document.getElementById('extraParams2');
        const customHeaders1Input = document.getElementById('customHeaders1');
        const customHeaders2Input = document.getElementById('customHeaders2');
        const apiUrlsInput = document.getElementById('apiUrls');
        const resultsTable1 = document.getElementById('resultsTable1');
        const resultsTable2 = document.getElementById('resultsTable2');
        const notification = document.getElementById('notification');
        const count1 = document.getElementById('count1');
        const count2 = document.getElementById('count2');
        
        let currentResults1 = [];
        let currentResults2 = [];

        function showNotification(message, type = 'info') {
            notification.textContent = message;
            notification.className = `notification ${type} show`;
            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }
        
        function generateTimestamp() {
            return Math.floor(Date.now() / 1000).toString().substring(0, 10);
        }
        
        function calculateToken() {
            const timestamp = generateTimestamp();
            const data = "metersphere" + timestamp + SECRET_KEY;
            return CryptoJS.MD5(data).toString();
        }
        
        function buildBaseHeaders() {
            return {
                'x-request-timestamp': generateTimestamp(),
                'x-request-access-token': calculateToken(),
                'x-request-from-app-name': 'metersphere',
                'Content-Type': 'application/json'
            };
        }
        
        function mergeHeaders(baseHeaders, customHeaders) {
            return {...baseHeaders, ...customHeaders};
        }
        
        function buildRequestData(searchTerm, extraParams = {}) {
            return {
                searchKey: searchTerm,
                reasonType: 1,
                filter: "{\"hst\":[5]}",
                "withNewFields": 1,
                pageSize: 40,
                ...extraParams
            };
        }
        
        async function callApi(url, headers, data) {
            try {
                console.log('调用API:', url);
                const response = await fetch(url, {
                    method: 'POST',
                    headers: headers,
                    body: JSON.stringify(data)
                });
                if (!response.ok) {
                    throw new Error(`HTTP错误! 状态码: ${response.status}`);
                }
                const result = await response.json();
                return result;
            } catch (error) {
                console.error('API调用失败:', error);
                throw error;
            }
        }

        // ========== 转换单个条目 (携带香港标记) ==========
        function convertResultItem(item, isHK = false) {
            let nameStr = item.Name || 'NA';
            if (item.ShortStatus) nameStr += '【' + item.ShortStatus + '】';
            if (item.RegistCapi) nameStr += item.RegistCapi;
            if (isHK) {
                nameStr += ' 【插入香港记录】';   // 标记
            }

            return {
                score: [item.ApiScore || '0'],
                imageUrl: item.ImageUrl || null,
                name: [nameStr],
                hitreason: [JSON.stringify(item.HitReason || 'NA')],
                tags: (item.TagsInfoV2 || []).map(tag => JSON.stringify(tag.Name || 'NA'))
            };
        }

        // ========== 处理API返回数据 (增强版：支持无Result但HKCompanies存在且HKIndex为空时直接展示) ==========
        function processApiData(apiResult) {
            // 基础结果数组 (可能为空)
            const baseResults = (apiResult && apiResult.Result && Array.isArray(apiResult.Result)) 
                ? apiResult.Result.map(item => convertResultItem(item, false)) 
                : [];

            // 香港公司列表
            let hkItems = [];
            if (apiResult && apiResult.HKCompanies) {
                if (Array.isArray(apiResult.HKCompanies)) {
                    hkItems = apiResult.HKCompanies.map(item => convertResultItem(item, true));
                } else {
                    hkItems = [convertResultItem(apiResult.HKCompanies, true)];
                }
            }

            let finalResults = [...baseResults];
            const rawIndex = apiResult ? apiResult.HKIndex : undefined;
            const hasHK = hkItems.length > 0;

            // 情况1: 没有基础结果、有香港公司、且HKIndex为空 (undefined/null) —— 直接展示香港公司
            if (baseResults.length === 0 && hasHK && (rawIndex === undefined || rawIndex === null)) {
                finalResults = hkItems;
            }
            // 情况2: 有香港公司并且提供了HKIndex (无论基础结果是否为空) —— 按照索引插入
            else if (hasHK && rawIndex !== undefined && rawIndex !== null) {
                let index = parseInt(rawIndex, 10);
                // 索引0视为1 (需求)
                if (index <= 0) index = 1;
                let insertPos = Math.min(index, baseResults.length);
                finalResults.splice(insertPos, 0, ...hkItems);
            }
            // 其他情况: 保持 baseResults (可能包含或不包含香港公司，取决于原始数据)

            const totalRecords = (apiResult && apiResult.Paging) ? apiResult.Paging.TotalRecords : 0;
            return {
                results: finalResults,
                totalRecords: totalRecords
            };
        }

        // ========== 渲染表格（带红色香港标记） ==========
        function renderResultsTable(results, tableElement) {
            if (results.length === 0) {
                tableElement.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-search"></i>
                        <p>没有找到相关结果</p>
                    </div>
                `;
                return;
            }
            
            let tableHTML = `
                <table>
                    <thead>
                        <tr>
                            <th class="score-cell">分值</th>
                            <th class="image-cell">图片</th>
                            <th class="name-cell">企业名</th>
                            <th class="hitreason-cell">HitReason</th>
                            <th class="hitreasons-cell">tags</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            results.forEach(item => {
                tableHTML += `
                    <tr>
                        <td class="score-cell">
                            <div class="list-container">
                `;
                
                if (item.score && item.score.length > 0) {
                    item.score.forEach(scoreItem => {
                        tableHTML += `<div class="list-item">${scoreItem}</div>`;
                    });
                }
                
                tableHTML += `
                            </div>
                        </td>
                        <td class="image-cell">
                            <div class="list-container">
                `;
                
                if (item.imageUrl) {
                    tableHTML += `
                        <div class="list-item">
                            <img src="${item.imageUrl}" class="company-logo" onerror="this.onerror=null; this.src=''; this.innerHTML='<i class=\\'fas fa-building\\'></i>';" alt="公司logo">
                        </div>
                    `;
                } else {
                    tableHTML += `
                        <div class="list-item">
                            <div class="company-logo"><i class="fas fa-building"></i></div>
                        </div>
                    `;
                }
                
                tableHTML += `
                            </div>
                        </td>
                        <td class="name-cell">
                            <div class="list-container">
                `;
                
                if (item.name && item.name.length > 0) {
                    item.name.forEach(nameItem => {
                        // 检查是否包含香港标记，添加红色样式
                        const isHK = nameItem.includes('【插入香港记录】');
                        const nameContent = isHK 
                            ? nameItem.replace('【插入香港记录】', '<span class="hk-insert">【插入香港记录】</span>')
                            : nameItem;
                        tableHTML += `
                            <div class="list-item company-item">
                                <div class="company-name">${nameContent}</div>
                            </div>
                        `;
                    });
                }
                
                tableHTML += `
                            </div>
                        </td>
                        <td class="hitreason-cell">
                            <div class="list-container">
                `;
                
                if (item.hitreason && item.hitreason.length > 0) {
                    item.hitreason.forEach(reason => {
                        try {
                            const parsed = JSON.parse(reason);
                            tableHTML += `<div class="list-item">${parsed.Field}:${parsed.Value}</div>`;
                        } catch {
                            tableHTML += `<div class="list-item">${reason}</div>`;
                        }
                    });
                }
                
                tableHTML += `
                            </div>
                        </td>
                        <td class="hitreasons-cell">
                            <div class="list-container">
                `;
                
                if (item.tags && item.tags.length > 0) {
                    item.tags.forEach(tag => {
                        const cleanTag = tag.replace(/^"+|"+$/g, '');
                        tableHTML += `<div class="list-item">${cleanTag}</div>`;
                    });
                }
                tableHTML += `
                            </div>
                        </td>
                    </tr>
                `;
            });
            
            tableHTML += `
                    </tbody>
                </table>
            `;
            
            tableElement.innerHTML = tableHTML;
            
            // 处理高亮 <em> 标签
            highlightAllElements(tableElement);
        }
        
        function highlightAllElements(tableElement) {
            const listItems = tableElement.querySelectorAll('.list-item');
            listItems.forEach(item => {
                item.innerHTML = item.innerHTML.replace(
                    /<em>(.*?)<\/em>/g, 
                    '<span class="highlight">$1</span>'
                );
            });
        }

        // ========== 搜索主流程 ==========
        async function searchBothApis(searchTerm, paramsObj1, paramsObj2, headersObj1, headersObj2, apiConfig) {
            resultsTable1.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>正在调用测试接口...</p>
                </div>
            `;
            resultsTable2.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>正在调用对比接口...</p>
                </div>
            `;
            
            count1.textContent = 'count: 0';
            count2.textContent = 'count: 0';
            
            try {
                const baseHeaders = buildBaseHeaders();
                const headers1 = mergeHeaders(baseHeaders, headersObj1);
                const headers2 = mergeHeaders(baseHeaders, headersObj2);
                
                const data1 = buildRequestData(searchTerm, paramsObj1);
                const data2 = buildRequestData(searchTerm, paramsObj2);
                
                const [result1, result2] = await Promise.all([
                    callApi(apiConfig.url1, headers1, data1),
                    callApi(apiConfig.url2, headers2, data2)
                ]);
                
                // 处理数据（包含香港记录插入优化）
                const processedData1 = processApiData(result1);
                const processedData2 = processApiData(result2);
                
                currentResults1 = processedData1.results;
                currentResults2 = processedData2.results;
                
                // 更新计数：显示实际条数 + (原始总数)
                count1.textContent = `count: ${processedData1.results.length} (原:${processedData1.totalRecords})`;
                count2.textContent = `count: ${processedData2.results.length} (原:${processedData2.totalRecords})`;
                
                renderResultsTable(currentResults1, resultsTable1);
                renderResultsTable(currentResults2, resultsTable2);
                
                showNotification(`搜索完成，测试接口返回 ${currentResults1.length} 条，对比接口返回 ${currentResults2.length} 条`, 'success');
                
            } catch (error) {
                console.error('搜索失败:', error);
                showNotification(`搜索失败: ${error.message}`, 'error');
                
                resultsTable1.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-triangle"></i>
                        <p>测试接口调用失败</p>
                        <p style="font-size: 0.8rem; margin-top: 5px;">${error.message}</p>
                    </div>
                `;
                resultsTable2.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-triangle"></i>
                        <p>对比接口调用失败</p>
                        <p style="font-size: 0.8rem; margin-top: 5px;">${error.message}</p>
                    </div>
                `;
                
                count1.textContent = 'count: 0';
                count2.textContent = 'count: 0';
            }
        }

        // ========== 事件监听 ==========
        searchBtn.addEventListener('click', async function() {
            const searchTerm = searchTermInput.value.trim();
            const extraParams1 = extraParams1Input.value.trim();
            const extraParams2 = extraParams2Input.value.trim();
            const customHeaders1 = customHeaders1Input.value.trim();
            const customHeaders2 = customHeaders2Input.value.trim();
            const apiUrls = apiUrlsInput.value.trim();

            if (!searchTerm) {
                showNotification('请输入搜索词', 'error');
                return;
            }

            let paramsObj1 = {}, paramsObj2 = {};
            if (extraParams1) {
                try { paramsObj1 = JSON.parse(extraParams1); } catch { showNotification('测试接口参数格式错误', 'error'); return; }
            }
            if (extraParams2) {
                try { paramsObj2 = JSON.parse(extraParams2); } catch { showNotification('对比接口参数格式错误', 'error'); return; }
            }

            let headersObj1 = {}, headersObj2 = {};
            if (customHeaders1) {
                try { headersObj1 = JSON.parse(customHeaders1); } catch { showNotification('测试接口请求头格式错误', 'error'); return; }
            }
            if (customHeaders2) {
                try { headersObj2 = JSON.parse(customHeaders2); } catch { showNotification('对比接口请求头格式错误', 'error'); return; }
            }

            let apiConfig = {...DEFAULT_API_CONFIG};
            if (apiUrls) {
                try {
                    const parsedUrls = JSON.parse(apiUrls);
                    apiConfig = {...apiConfig, ...parsedUrls};
                } catch { showNotification('API URL配置格式错误', 'error'); return; }
            }

            await searchBothApis(searchTerm, paramsObj1, paramsObj2, headersObj1, headersObj2, apiConfig);
        });

        // 保存按钮（保留但注释，不做修改）
        if (saveBtn) {
            saveBtn.addEventListener('click', function() {
                showNotification('保存功能已禁用（演示）', 'info');
            });
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 可放置初始化逻辑
        });
    </script>
</body>
</html>
