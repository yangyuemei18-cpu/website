<body>

    <div id="notification" class="notification"></div>

    <script>
        // 默认接口配置
        const DEFAULT_API_CONFIG = {
            url1: 'http://nodejs-qcc-backend-data.sit.office.greatld.com/api/qccsearch/searchrecommendation?ignoreCache=true',
            url2: 'http://nodejs-qcc-backend-data.prod.office.greatld.com/api/qccsearch/searchrecommendation?ignoreCache=true'
        };
        
        // 固定密钥
        const SECRET_KEY = 'e7e3096d-7dd0-4ddd-98d3-0b2b77996f6e';
        
        // DOM元素
        const searchBtn = document.getElementById('searchBtn');
        const searchTermInput = document.getElementById('searchTerm');
        const extraParams1Input = document.getElementById('extraParams1');
        const extraParams2Input = document.getElementById('extraParams2');
        const customHeaders1Input = document.getElementById('customHeaders1');
        const customHeaders2Input = document.getElementById('customHeaders2');
        const apiUrlsInput = document.getElementById('apiUrls');
        const resultsTable1 = document.getElementById('resultsTable1');
        const resultsTable2 = document.getElementById('resultsTable2');
        const notification = document.getElementById('notification');
        const count1 = document.getElementById('count1');
        const count2 = document.getElementById('count2');
        
        // 当前搜索结果
        let currentResults1 = [];
        let currentResults2 = [];
        
        // 显示通知
        function showNotification(message, type = 'info') {
            notification.textContent = message;
            notification.className = `notification ${type} show`;
            
            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }
        
        // 生成时间戳（前10位）
        function generateTimestamp() {
            return Math.floor(Date.now() / 1000).toString().substring(0, 10);
        }
        
        // 计算MD5 token
        function calculateToken() {
            const timestamp = generateTimestamp();
            const data = "metersphere" + timestamp + SECRET_KEY;
            
            // 使用CryptoJS计算MD5
            return CryptoJS.MD5(data).toString();
        }
        
        // 构建基础请求头
        function buildBaseHeaders() {
            return {
                'x-request-timestamp': generateTimestamp(),
                'x-request-access-token': calculateToken(),
                'x-request-from-app-name': 'metersphere',
                'Content-Type': 'application/json',
            };
        }
        
        // 合并请求头
        function mergeHeaders(baseHeaders, customHeaders) {
            return {...baseHeaders, ...customHeaders};
        }
        
        // 构建请求数据
        function buildRequestData(searchTerm, extraParams = {}) {
            return {
                searchKey: searchTerm,
                reasonType: 1,
				withBalance: 1,
				type:1,
				withNewFields : 1,
				searchType:"0,1,3,4,5,10,11,12,15,21",
                // filter: "{\"hst\":[5]}",
                ...extraParams
            };
        }
        
        // 调用API
        async function callApi(url, headers, data) {
            try {
                // 添加时间戳防止缓存
                const timestamp = Date.now();
                const urlWithCacheBuster = url.includes('?')
                    ? `${url}&_t=${timestamp}`
                    : `${url}?_t=${timestamp}`;
                console.log('调用API:', urlWithCacheBuster);
                console.log('请求头:', headers);
                console.log('请求数据:', data);
                
                const response = await fetch(urlWithCacheBuster, {
                    method: 'POST',
                    headers: headers,
                    body: JSON.stringify(data)
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP错误! 状态码: ${response.status}`);
                }
                
                const result = await response.json();
                console.log('API返回:', result);
                return result;
            } catch (error) {
                console.error('API调用失败:', error);
                throw error;
            }
        }

        // 添加重置所有输入框的函数
function resetAllInputs() {
    searchTermInput.value = '';
    extraParams1Input.value = '';
    extraParams2Input.value = '';
    customHeaders1Input.value = '';
    customHeaders2Input.value = '';
    apiUrlsInput.value = '';

    // 清空结果
    resultsTable1.innerHTML = `
        <div class="empty-state">
            <i class="fas fa-inbox"></i>
            <p>暂无数据，请输入搜索词并点击查询</p>
        </div>
    `;

    resultsTable2.innerHTML = `
        <div class="empty-state">
            <i class="fas fa-inbox"></i>
            <p>暂无数据，请输入搜索词并点击查询</p>
        </div>
    `;

    // 重置计数
    count1.textContent = 'count: 0';
    count2.textContent = 'count: 0';

    showNotification('已重置所有输入和结果', 'info');
}

        
// 处理新版API返回数据（测试接口）
function processNewApiData(apiResult) {
    if (!apiResult || !apiResult.Result || !Array.isArray(apiResult.Result)) {
        return {
            results: [],
            totalRecords: 0
        };
    }

    const results = [];
    let totalRecords = 0;

    // 新版结构：Result是一个数组，每个元素包含Datas数组
    apiResult.Result.forEach((group, groupIndex) => {
        const datas = group.Datas || [];

        console.log(`第${groupIndex + 1}组: Datas长度=${datas.length}`);

        // 遍历每个第一层Datas元素
        datas.forEach((dataItem, dataIndex) => {
            const type = dataItem.Type || '';
            const typeDesc = dataItem.TypeDesc || '';
            const isCompany = type === 'company';
            const isMultiple = type === 'multiple';
			const isPerson = type === 'person';
            
            console.log(`第${groupIndex + 1}组，第${dataIndex + 1}个Data: Type="${type}", TypeDesc="${typeDesc}"`);

            if (isCompany) {
                // 处理企业类型数据
                const records = dataItem.Records || [];
                console.log(`企业类型: Records长度=${records.length}`);
                
                // 遍历企业记录
                records.forEach((record, recordIndex) => {
                    totalRecords++;
                    
                    // 构建企业结果项
                    const resultItem = {
                        score: [record.ApiScore || '0'],
                        imageUrl: record.ImageUrl || null,
                        name: [],
                        hitreason: [],
                        tags: []
                    };
                    
                    // 企业名称处理
                    const name = record.Name || '未知企业';
                    const shortStatus = record.ShortStatus || '';
                    const registCapi = record.RegistCapi || 'NA';
                    const statusText = shortStatus ? `【${shortStatus}】` : '';
                    resultItem.name.push(`${name}${statusText}${registCapi}`);
                    
                    // HitReason处理
                    if (record.HitReason) {
                        resultItem.hitreason.push(JSON.stringify(record.HitReason));
                    } else {
                        resultItem.hitreason.push('NA');
                    }
                    
                    // Tags处理
                    if (record.TagsInfoV2 && Array.isArray(record.TagsInfoV2)) {
                        record.TagsInfoV2.forEach(tag => {
                            resultItem.tags.push(JSON.stringify(tag.Name || 'NA'));
                        });
                    } else {
                        resultItem.tags.push('NA');
                    }
                    
                    console.log(`处理企业记录${totalRecords}: name="${resultItem.name[0]}", score="${resultItem.score[0]}"`);
                    results.push(resultItem);
                });
                
            } else if (isMultiple) {
                // 处理multiple类型（嵌套Datas）
                const innerDatas = dataItem.Datas || [];
                const totalRecordsForMultiple = dataItem.TotalRecords || '0';
                
                console.log(`Multiple类型: 嵌套Datas长度=${innerDatas.length}, TotalRecords=${totalRecordsForMultiple}`);
                
                // 遍历第二层Datas
                innerDatas.forEach((innerData, innerIndex) => {
                    const innerType = innerData.Type || '';
                    const innerTypeDesc = innerData.TypeDesc || '';
                    const innerRecords = innerData.Records || [];
                    const innerTotalRecords = innerData.TotalRecords || '0';
                    
                    console.log(`嵌套Data${innerIndex + 1}: Type="${innerType}", TypeDesc="${innerTypeDesc}", Records长度=${innerRecords.length}`);
                    
                    // 遍历嵌套记录
                    innerRecords.forEach((record, recordIndex) => {
                        totalRecords++;
                        
                        // 构建非企业结果项
                        const resultItem = {
                            score: ['0'], // 非企业类型通常没有ApiScore
                            imageUrl: record.ImageUrl || null,
                            name: [],
                            hitreason: [],
                            tags: []
                        };
                        
                        // 非企业名称处理
                        resultItem.name.push(record.Title || innerTypeDesc || '未知类型');
                        
                        // HitReason使用TotalRecords
                        resultItem.hitreason.push(innerTotalRecords.toString());
                        
                        // Tags使用TypeDesc
                        resultItem.tags.push(innerTypeDesc || 'NA');
                        
                        console.log(`处理非企业记录${totalRecords}: name="${resultItem.name[0]}", type="${innerTypeDesc}"`);
                        results.push(resultItem);
                    });
                    
                    // 如果没有记录，但仍然需要显示一些信息
                    if (innerRecords.length === 0) {
                        totalRecords++;
                        const resultItem = {
                            score: ['0'],
                            imageUrl: null,
                            name: [innerTypeDesc || '未知类型'],
                            hitreason: [innerTotalRecords.toString()],
                            tags: [innerTypeDesc || 'NA']
                        };
                        
                        console.log(`无记录但显示TotalRecords: ${innerTypeDesc}, TotalRecords=${innerTotalRecords}`);
                        results.push(resultItem);
                    }
                });
                
                // 如果没有嵌套Datas，但有多类型数据
                if (innerDatas.length === 0 && totalRecordsForMultiple !== '0') {
                    totalRecords++;
                    const resultItem = {
                        score: ['0'],
                        imageUrl: null,
                        name: [typeDesc || '多类型数据'],
                        hitreason: [totalRecordsForMultiple.toString()],

        // 修改现有的JSON解析逻辑
function parseJSONSafe(jsonString, defaultValue = {}) {
    if (!jsonString || jsonString.trim() === '') {
        return defaultValue;
    }
    try {
        return JSON.parse(jsonString);
    } catch (e) {
        showNotification('JSON格式错误，请检查输入', 'error');
        throw e; // 重新抛出异常
    }
}

        // 调用两个API进行搜索
        async function searchBothApis(searchTerm, paramsObj1, paramsObj2, headersObj1, headersObj2, apiConfig) {
            // 显示加载状态
            resultsTable1.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>正在调用测试接口...</p>
                </div>
            `;
            
            resultsTable2.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>正在调用对比接口...</p>
                </div>
            `;
            
            // 重置计数显示
            count1.textContent = 'count: 0';
            count2.textContent = 'count: 0';
            
            try {
                const baseHeaders = buildBaseHeaders();
                const headers1 = mergeHeaders(baseHeaders, headersObj1);
                const headers2 = mergeHeaders(baseHeaders, headersObj2);
                
                const data1 = buildRequestData(searchTerm, paramsObj1);
                const data2 = buildRequestData(searchTerm, paramsObj2);
                
                // 并行调用两个接口
                const [result1, result2] = await Promise.all([
                    callApi(apiConfig.url1, headers1, data1),
                    callApi(apiConfig.url2, headers2, data2)
                ]);
                
                // 处理返回数据 - 两个接口均使用新版数据结构解析
                const processedData1 = processNewApiData(result1);
                const processedData2 = processNewApiData(result2);
                
                currentResults1 = processedData1.results;
                currentResults2 = processedData2.results;
                
                // 更新计数显示（均使用实际渲染的条目数）
                count1.textContent = `count: ${currentResults1.length}`;
                count2.textContent = `count: ${currentResults2.length}`;
                
                // 渲染结果表格
                renderResultsTable(currentResults1, resultsTable1);
                renderResultsTable(currentResults2, resultsTable2);
                
                showNotification(`搜索完成，测试接口返回 ${currentResults1.length} 条结果，对比接口返回 ${currentResults2.length} 条结果`, 'success');
                
            } catch (error) {
                console.error('搜索失败:', error);
                showNotification(`搜索失败: ${error.message}`, 'error');
                
                // 显示错误状态
                resultsTable1.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-triangle"></i>
                        <p>测试接口调用失败</p>
                        <p style="font-size: 0.8rem; margin-top: 5px;">${error.message}</p>
                    </div>
                `;
                
                resultsTable2.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-triangle"></i>
                        <p>对比接口调用失败</p>
                        <p style="font-size: 0.8rem; margin-top: 5px;">${error.message}</p>
                    </div>
                `;
                
                // 重置计数显示
                count1.textContent = 'count: 0';
                count2.textContent = 'count: 0';
            }
        }
        
        // 渲染结果表格
        function renderResultsTable(results, tableElement) {
            if (results.length === 0) {
                tableElement.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-search"></i>
                        <p>没有找到相关结果</p>
                    </div>
                `;
                return;
            }
            
            let tableHTML = `
                <table>
                    <thead>
                        <tr>
                            <th class="score-cell">分值</th>
                            <th class="image-cell">图片</th>
                            <th class="name-cell">企业名</th>
                            <th class="hitreason-cell">HitReason</th>
                            <th class="hitreasons-cell">tags</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            results.forEach(item => {
                tableHTML += `
                    <tr>
                        <td class="score-cell">
                            <div class="list-container">
                `;
                
                // 遍历score列表
                if (item.score && item.score.length > 0) {
                    item.score.forEach(scoreItem => {
                        tableHTML += `
                            <div class="list-item">${scoreItem}</div>
                        `;
                    });
                }
                
                tableHTML += `
                            </div>
                        </td>
                        <td class="image-cell">
                            <div class="list-container">
                `;
                
                // 显示图片
                if (item.imageUrl) {
                    tableHTML += `
                        <div class="list-item">
                            <img src="${item.imageUrl}" class="company-logo" onerror="this.onerror=null; this.src=''; this.innerHTML='<i class=\\'fas fa-building\\'></i>';" alt="公司logo">
                        </div>
                    `;
                } else {
                    tableHTML += `
                        <div class="list-item">
                            <div class="company-logo"><i class="fas fa-building"></i></div>
                        </div>
                    `;
                }
                
                tableHTML += `
                            </div>
                        </td>
                        <td class="name-cell">
                            <div class="list-container">
                `;
                
                // 遍历name列表
                if (item.name && item.name.length > 0) {
                    item.name.forEach(nameItem => {
                        tableHTML += `
                            <div class="list-item company-item">
                                <div class="company-name">${nameItem}</div>
                            </div>
                        `;
                    });
                }
                
                tableHTML += `
                            </div>
                        </td>
                        <td class="hitreason-cell">
                            <div class="list-container">
                `;
                
                // 遍历hitreason列表
                if (item.hitreason && item.hitreason.length > 0) {
                    // 检查是否包含 'Field' 字符串
                    const hasField = item.hitreason.some(reason =>
                        typeof reason === 'string' && reason.includes('Field')
                    );

                    if (hasField) {
                        item.hitreason.forEach(reason => {
                            try {
                                // 安全地解析 JSON
                                const parsedReason = JSON.parse(reason);
                                tableHTML += `
                                    <div class="list-item">${parsedReason.Field}:${parsedReason.Value}</div>
                                `;
                            } catch (error) {
                                // 如果解析失败，回退到直接显示
                                tableHTML += `
                                <div class="list-item">${reason}</div>
                            `;
                            }
                        });
                    } else {
                        item.hitreason.forEach(reason => {
                            tableHTML += `
                                <div class="list-item">${reason}</div>
                            `;
                        });
                    }
                }
                
                tableHTML += `
                            </div>
                        </td>
                        <td class="hitreasons-cell">
                            <div class="list-container">
                `;
                
                // 遍历tags列表
                if (item.tags && item.tags.length > 0) {
                    item.tags.forEach(tag => {
                        tableHTML += `
                            <div class="list-item">${tag.replace(/"/g, '')}</div>
                        `;
                    });
                }
                
                tableHTML += `
                            </div>
                        </td>
                    </tr>
                `;
            });
            
            tableHTML += `
                    </tbody>
                </table>
            `;
            
            tableElement.innerHTML = tableHTML;
            
            // 处理高亮显示 - 所有列都应用高亮
            highlightAllElements(tableElement);
        }
        
        // 处理所有列的高亮显示
        function highlightAllElements(tableElement) {
            const listItems = tableElement.querySelectorAll('.list-item');
            listItems.forEach(item => {
                // 将<em>标签内容替换为高亮样式
                item.innerHTML = item.innerHTML.replace(
                    /<em>(.*?)<\/em>/g, 
                    '<span class="highlight">$1</span>'
                );
            });
        }
        
        // 获取当前时间（不含特殊符号）
        function getCurrentTime() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hour = String(now.getHours()).padStart(2, '0');
            const minute = String(now.getMinutes()).padStart(2, '0');
            const second = String(now.getSeconds()).padStart(2, '0');
            
            return `${year}${month}${day}${hour}${minute}${second}`;
        }
