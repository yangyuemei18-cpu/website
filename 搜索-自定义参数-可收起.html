<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>搜索与结果管理系统 - 双环境对比</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 8px;
            color: #333;
            font-size: 9px;
        }
        
        .container {
            max-width: 100%;
            margin: 0 auto;
            height: calc(100vh - 16px);
            display: flex;
            flex-direction: column;
        }
        
        header {
            text-align: center;
            margin-bottom: 12px;
            padding: 12px;
            background: white;
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            flex-shrink: 0;
        }
        
        h1 {
            color: #2c3e50;
            margin-bottom: 6px;
            font-size: 1.6rem;
        }
        
        .subtitle {
            color: #7f8c8d;
            font-size: 0.9rem;
        }
        
        .search-section {
            background: white;
            padding: 12px;
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            margin-bottom: 12px;
            flex-shrink: 0;
        }
        
        .search-row {
            display: flex;
            gap: 10px;
            align-items: flex-end;
            margin-bottom: 12px;
        }
        
        .search-row:last-child {
            margin-bottom: 0;
        }
        
        .form-group {
            flex: 1;
        }
        
        .compact-group {
            flex: 0.8;
        }
        
        .header-group {
            flex: 1;
        }
        
        label {
            display: block;
            margin-bottom: 4px;
            font-weight: 600;
            color: #2c3e50;
            font-size: 0.9rem;
        }
        
        input[type="text"], textarea {
            width: 100%;
            padding: 6px 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 0.9rem;
            transition: all 0.3s;
            font-family: 'Courier New', monospace;
        }
        
        textarea {
            height: 60px;
            resize: vertical;
        }
        
        input[type="text"]:focus, textarea:focus {
            border-color: #3498db;
            box-shadow: 0 0 0 2px rgba(52, 152, 219, 0.2);
            outline: none;
        }
        
        .button-group {
            display: flex;
            gap: 8px;
            flex: 0.6;
        }
        
        button {
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            flex: 1;
        }
        
        .search-btn {
            background: #3498db;
            color: white;
        }
        
        .search-btn:hover {
            background: #2980b9;
            transform: translateY(-1px);
            box-shadow: 0 2px 5px rgba(52, 152, 219, 0.3);
        }
        
        .save-btn {
            background: #2ecc71;
            color: white;
        }
        
        .save-btn:hover {
            background: #27ae60;
            transform: translateY(-1px);
            box-shadow: 0 2px 5px rgba(46, 204, 113, 0.3);
        }
        
        .header-toggle {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 8px;
            cursor: pointer;
            color: #3498db;
            font-size: 0.9rem;
            font-weight: 600;
        }
        
        .header-toggle i {
            transition: transform 0.3s;
        }
        
        .header-toggle.collapsed i {
            transform: rotate(-90deg);
        }
        
        .header-params-container {
            overflow: hidden;
            transition: all 0.3s;
            max-height: 200px;
        }
        
        .header-params-container.collapsed {
            max-height: 0;
            margin-bottom: 0;
        }
        
        .results-section {
            background: white;
            padding: 12px;
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .results-container {
            display: flex;
            gap: 12px;
            flex: 1;
            overflow: hidden;
        }
        
        .result-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            border: 1px solid #e9ecef;
            border-radius: 6px;
            overflow: hidden;
        }
        
        .panel-header {
            background: #f8f9fa;
            padding: 8px;
            border-bottom: 1px solid #e9ecef;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-weight: 600;
            color: #2c3e50;
            font-size: 0.9rem;
        }
        
        .panel-title {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .panel-header.api1 .panel-title {
            color: #3498db;
        }
        
        .panel-header.api2 .panel-title {
            color: #e74c3c;
        }
        
        .count-badge {
            background: #e9ecef;
            color: #6c757d;
            padding: 2px 6px;
            border-radius: 10px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        
        .panel-header.api1 .count-badge {
            background: #3498db;
            color: white;
        }
        
        .panel-header.api2 .count-badge {
            background: #e74c3c;
            color: white;
        }
        
        .section-title {
            font-size: 1.1rem;
            margin-bottom: 8px;
            color: #2c3e50;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }
        
        .section-title i {
            color: #3498db;
        }
        
        .table-container {
            flex: 1;
            overflow: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 9px;
        }
        
        th {
            background: #f8f9fa;
            padding: 6px;
            text-align: left;
            font-weight: 600;
            color: #2c3e50;
            border-bottom: 2px solid #e9ecef;
            position: sticky;
            top: 0;
        }
        
        td {
            padding: 6px;
            border-bottom: 1px solid #e9ecef;
            vertical-align: top;
        }
        
        tr:hover {
            background: #f8f9fa;
        }
        
        .score-cell {
            font-weight: 600;
            color: #e74c3c;
            width: 60px;
        }
        
        .image-cell {
            width: 40px;
            text-align: center;
        }
        
        .name-cell, .hitreason-cell, .hitreasons-cell {
            color: #2c3e50;
        }
        
        .list-container {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        
        .list-item {
            padding: 2px 3px;
            border-radius: 2px;
            background: #f8f9fa;
            line-height: 1.2;
        }
        
        .company-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .company-logo {
            width: 20px;
            height: 20px;
            border-radius: 2px;
            object-fit: cover;
            flex-shrink: 0;
            background-color: #f8f9fa;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 8px;
            color: #7f8c8d;
        }
        
        .company-name {
            flex: 1;
        }
        
        .highlight {
            background-color: #fff3cd;
            color: #856404;
            padding: 1px 2px;
            border-radius: 2px;
            font-weight: 600;
        }
        
        .empty-state {
            text-align: center;
            padding: 20px;
            color: #7f8c8d;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        
        .empty-state i {
            font-size: 2rem;
            margin-bottom: 8px;
            color: #bdc3c7;
        }
        
        .empty-state p {
            font-size: 0.9rem;
        }
        
        .notification {
            position: fixed;
            top: 8px;
            right: 8px;
            padding: 8px 12px;
            border-radius: 4px;
            color: white;
            font-weight: 600;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
            z-index: 1000;
            opacity: 0;
            transform: translateY(-12px);
            transition: all 0.3s;
            font-size: 0.9rem;
        }
        
        .notification.show {
            opacity: 1;
            transform: translateY(0);
        }
        
        .notification.success {
            background: #2ecc71;
        }
        
        .notification.error {
            background: #e74c3c;
        }
        
        .notification.info {
            background: #3498db;
        }
        
        footer {
            text-align: center;
            padding: 8px;
            color: #7f8c8d;
            font-size: 0.8rem;
            flex-shrink: 0;
        }
        
        @media (max-width: 768px) {
            .search-row {
                flex-direction: column;
                gap: 8px;
            }
            
            .results-container {
                flex-direction: column;
            }
            
            .button-group {
                width: 100%;
            }
            
            th, td {
                padding: 4px;
                font-size: 7px;
            }
            
            .company-logo {
                width: 16px;
                height: 16px;
            }
            
            .panel-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 4px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h2>搜索与结果管理系统 - 双环境对比</h2>
        </header>
        
        <section class="search-section">
            <div class="search-row">
                <div class="form-group">
                    <label for="searchTerm"><i class="fas fa-search"></i> 搜索词</label>
                    <input type="text" id="searchTerm" autofocus placeholder="请输入搜索词...">
                </div>
                
                <div class="form-group compact-group">
                    <label for="extraParams1"><i class="fas fa-cog"></i> 测试接口参数</label>
                    <input type="text" id="extraParams1" placeholder='JSON格式'>
                </div>
                
                <div class="form-group compact-group">
                    <label for="extraParams2"><i class="fas fa-cog"></i> 对比接口参数</label>
                    <input type="text" id="extraParams2" placeholder='JSON格式'>
                </div>
                
                <div class="button-group">
                    <button class="search-btn" type="submit" id="searchBtn">
                        <i class="fas fa-search"></i> 查询
                    </button>

                    <button class="save-btn" id="saveBtn">
                        <i class="fas fa-save"></i> 保存
                    </button>
                </div>
            </div>
            
            <div class="header-toggle" id="headerToggle">
                <i class="fas fa-chevron-down"></i>
                <span>展开Header参数配置</span>
            </div>
            
            <div class="header-params-container collapsed" id="headerParamsContainer">
                <div class="search-row">
                    <div class="header-group">
                        <label for="headers1"><i class="fas fa-code"></i> 测试接口Header</label>
                        <textarea id="headers1" placeholder='JSON格式，如：{"x-request-strategy-custom-ab-search-group-code": "EXPERIMENT_A"}'>{"x-request-strategy-custom-ab-search-group-code": "EXPERIMENT_A"}</textarea>
                    </div>
                    
                    <div class="header-group">
                        <label for="headers2"><i class="fas fa-code"></i> 对比接口Header</label>
                        <textarea id="headers2" placeholder='JSON格式，如：{"x-request-strategy-custom-ab-search-group-code": "CONTROL_A"}'>{"x-request-strategy-custom-ab-search-group-code": "CONTROL_A"}</textarea>
                    </div>
                </div>
            </div>
        </section>
        
        <script>
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('searchBtn').click();
            }
        });
        </script>
        
        <section class="results-section">
            <div class="results-container">
                <div class="result-panel">
                    <div class="panel-header api1">
                        <div class="panel-title">
                            <i class="fas fa-database"></i> 测试接口结果
                        </div>
                        <div class="count-display">
                            <span class="count-badge" id="count1">count: 0</span>
                        </div>
                    </div>
                    <div class="table-container" id="resultsTable1">
                        <div class="empty-state">
                            <i class="fas fa-inbox"></i>
                            <p>暂无数据，请输入搜索词并点击查询</p>
                        </div>
                    </div>
                </div>
                
                <div class="result-panel">
                    <div class="panel-header api2">
                        <div class="panel-title">
                            <i class="fas fa-server"></i> 对比接口结果
                        </div>
                        <div class="count-display">
                            <span class="count-badge" id="count2">count: 0</span>
                        </div>
                    </div>
                    <div class="table-container" id="resultsTable2">
                        <div class="empty-state">
                            <i class="fas fa-inbox"></i>
                            <p>暂无数据，请输入搜索词并点击查询</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>
        
        <footer>
            <p>© 2025 搜索与结果管理系统 | 双环境对比 - 独立Header配置</p>
        </footer>
    </div>

    <div id="notification" class="notification"></div>

    <script>
        // 接口配置
        const API_CONFIG = {
            url1: 'http://nodejs-qcc-backend-data.sit.office.greatld.com/api/ECILocal/SearchMultiSelection?ignoreCache=true',
            url2: 'http://nodejs-qcc-backend-data.prod.office.greatld.com/api/ECILocal/SearchMultiSelection?ignoreCache=true'
        };
        
        // 固定密钥
        const SECRET_KEY = 'e7e3096d-7dd0-4ddd-98d3-0b2b77996f6e';
        
        // DOM元素
        const searchBtn = document.getElementById('searchBtn');
        const saveBtn = document.getElementById('saveBtn');
        const searchTermInput = document.getElementById('searchTerm');
        const extraParams1Input = document.getElementById('extraParams1');
        const extraParams2Input = document.getElementById('extraParams2');
        const headers1Input = document.getElementById('headers1');
        const headers2Input = document.getElementById('headers2');
        const headerToggle = document.getElementById('headerToggle');
        const headerParamsContainer = document.getElementById('headerParamsContainer');
        const resultsTable1 = document.getElementById('resultsTable1');
        const resultsTable2 = document.getElementById('resultsTable2');
        const notification = document.getElementById('notification');
        const count1 = document.getElementById('count1');
        const count2 = document.getElementById('count2');
        
        // 当前搜索结果
        let currentResults1 = [];
        let currentResults2 = [];
        
        // Header配置展开/收起
        headerToggle.addEventListener('click', function() {
            headerParamsContainer.classList.toggle('collapsed');
            headerToggle.classList.toggle('collapsed');
            
            if (headerParamsContainer.classList.contains('collapsed')) {
                headerToggle.querySelector('span').textContent = '展开Header参数配置';
            } else {
                headerToggle.querySelector('span').textContent = '收起Header参数配置';
            }
        });
        
        // 显示通知
        function showNotification(message, type = 'info') {
            notification.textContent = message;
            notification.className = `notification ${type} show`;
            
            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }
        
        // 生成时间戳（前10位）
        function generateTimestamp() {
            return Math.floor(Date.now() / 1000).toString().substring(0, 10);
        }
        
        // 计算MD5 token
        function calculateToken() {
            const timestamp = generateTimestamp();
            const data = "metersphere" + timestamp + SECRET_KEY;
            
            // 使用CryptoJS计算MD5
            return CryptoJS.MD5(data).toString();
        }
        
        // 构建请求头 - 独立配置每个环境
        function buildHeaders(customHeaders = {}) {
            const headers = {
                'x-request-timestamp': generateTimestamp(),
                'x-request-access-token': calculateToken(),
                'x-request-from-app-name': 'metersphere',
                'Content-Type': 'application/json'
            };
            
            // 合并自定义header（如果提供了）
            Object.assign(headers, customHeaders);
            
            return headers;
        }
        
        // 构建请求数据
        function buildRequestData(searchTerm, extraParams = {}) {
            return {
                searchKey: searchTerm,
                reasonType: 1,
                filter: "{\"hst\":[5]}",
                pageSize: 40,
                ...extraParams
            };
        }
        
        // 调用API
        async function callApi(url, headers, data) {
            try {
                console.log('调用API:', url);
                console.log('请求头:', headers);
                console.log('请求数据:', data);
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: headers,
                    body: JSON.stringify(data)
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP错误! 状态码: ${response.status}`);
                }
                
                const result = await response.json();
                console.log('API返回:', result);
                return result;
            } catch (error) {
                console.error('API调用失败:', error);
                throw error;
            }
        }
        
        // 处理API返回数据
        function processApiData(apiResult) {
            if (!apiResult || !apiResult.Result || !Array.isArray(apiResult.Result)) {
                return {
                    results: [],
                    totalRecords: 0
                };
            }
            
            const results = apiResult.Result.map(item => {
                return {
                    score: [item.ApiScore || '0'],
                    imageUrl: item.ImageUrl || null,
                    name: [item.Name +'【'+item.ShortStatus+'】'+item.RegistCapi || 'NA'],
                    hitreason: [JSON.stringify(item.HitReason || 'NA')],
                    hit_field: (item.HitReasons || []).map(hitreason => JSON.stringify(hitreason.Field || 'NA')),
                    hit_value: (item.HitReasons || []).map(hitreason => JSON.stringify(hitreason.Value || 'NA')),
                    tags: (item.TagsInfoV2 || []).map(tag => JSON.stringify(tag.Name || 'NA'))
                };
            });
            
            return {
                results: results,
                totalRecords: apiResult.Paging ? apiResult.Paging.TotalRecords : 0
            };
        }
        
        // 搜索按钮点击事件
        searchBtn.addEventListener('click', async function() {
            const searchTerm = searchTermInput.value.trim();
            const extraParams1 = extraParams1Input.value.trim();
            const extraParams2 = extraParams2Input.value.trim();
            const headers1 = headers1Input.value.trim();
            const headers2 = headers2Input.value.trim();
            
            if (!searchTerm) {
                showNotification('请输入搜索词', 'error');
                return;
            }
            
            // 解析额外参数
            let paramsObj1 = {};
            let paramsObj2 = {};
            
            if (extraParams1) {
                try {
                    paramsObj1 = JSON.parse(extraParams1);
                } catch (e) {
                    showNotification('测试接口额外参数格式错误，请使用正确的JSON格式', 'error');
                    return;
                }
            }
            
            if (extraParams2) {
                try {
                    paramsObj2 = JSON.parse(extraParams2);
                } catch (e) {
                    showNotification('对比接口额外参数格式错误，请使用正确的JSON格式', 'error');
                    return;
                }
            }
            
            // 解析header参数
            let headersObj1 = {};
            let headersObj2 = {};
            
            if (headers1) {
                try {
                    headersObj1 = JSON.parse(headers1);
                } catch (e) {
                    showNotification('测试接口Header格式错误，请使用正确的JSON格式', 'error');
                    return;
                }
            }
            
            if (headers2) {
                try {
                    headersObj2 = JSON.parse(headers2);
                } catch (e) {
                    showNotification('对比接口Header格式错误，请使用正确的JSON格式', 'error');
                    return;
                }
            }
            
            // 调用两个接口
            await searchBothApis(searchTerm, paramsObj1, paramsObj2, headersObj1, headersObj2);
        });
        
        // 保存按钮点击事件
        saveBtn.addEventListener('click', function() {
            const searchTerm = searchTermInput.value.trim();
            
            if (!searchTerm) {
                showNotification('请输入搜索词', 'error');
                return;
            }
            
            if (currentResults1.length === 0 && currentResults2.length === 0) {
                showNotification('没有可保存的结果', 'error');
                return;
            }
            
            // 直接保存到MySQL数据库
            saveToMySQL(searchTerm, currentResults1, currentResults2);
        });
        
        // 调用两个API进行搜索
        async function searchBothApis(searchTerm, paramsObj1, paramsObj2, headersObj1, headersObj2) {
            // 显示加载状态
            resultsTable1.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>正在调用测试接口...</p>
                </div>
            `;
            
            resultsTable2.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>正在调用对比接口...</p>
                </div>
            `;
            
            // 重置计数显示
            count1.textContent = 'count: 0';
            count2.textContent = 'count: 0';
            
            try {
                // 为每个环境构建独立的header
                const headers1 = buildHeaders(headersObj1);
                const headers2 = buildHeaders(headersObj2);
                
                const data1 = buildRequestData(searchTerm, paramsObj1);
                const data2 = buildRequestData(searchTerm, paramsObj2);
                
                // 并行调用两个接口
                const [result1, result2] = await Promise.all([
                    callApi(API_CONFIG.url1, headers1, data1),
                    callApi(API_CONFIG.url2, headers2, data2)
                ]);
                
                // 处理返回数据
                const processedData1 = processApiData(result1);
                const processedData2 = processApiData(result2);
                
                currentResults1 = processedData1.results;
                currentResults2 = processedData2.results;
                
                // 更新计数显示
                count1.textContent = `count: ${processedData1.totalRecords}`;
                count2.textContent = `count: ${processedData2.totalRecords}`;
                
                // 渲染结果表格
                renderResultsTable(currentResults1, resultsTable1);
                renderResultsTable(currentResults2, resultsTable2);
                
                showNotification(`搜索完成，测试接口返回 ${currentResults1.length} 条结果，对比接口返回 ${currentResults2.length} 条结果`, 'success');
                
            } catch (error) {
                console.error('搜索失败:', error);
                showNotification(`搜索失败: ${error.message}`, 'error');
                
                // 显示错误状态
                resultsTable1.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-triangle"></i>
                        <p>测试接口调用失败</p>
                        <p style="font-size: 0.8rem; margin-top: 5px;">${error.message}</p>
                    </div>
                `;
                
                resultsTable2.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-triangle"></i>
                        <p>对比接口调用失败</p>
                        <p style="font-size: 0.8rem; margin-top: 5px;">${error.message}</p>
                    </div>
                `;
                
                // 重置计数显示
                count1.textContent = 'count: 0';
                count2.textContent = 'count: 0';
            }
        }
        
        // 渲染结果表格
        function renderResultsTable(results, tableElement) {
            if (results.length === 0) {
                tableElement.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-search"></i>
                        <p>没有找到相关结果</p>
                    </div>
                `;
                return;
            }
            
            let tableHTML = `
                <table>
                    <thead>
                        <tr>
                            <th class="score-cell">分值</th>
                            <th class="image-cell">图片</th>
                            <th class="name-cell">企业名</th>
                            <th class="hitreason-cell">Hitreason</th>
                            <th class="hitreason-field-cell">Hit_Field</th>
                            <th class="hitreason-value-cell">Hit_Value</th>
                            <th class="hitreasons-cell">tags</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            results.forEach(item => {
                tableHTML += `
                    <tr>
                        <td class="score-cell">
                            <div class="list-container">
                `;
                
                // 遍历score列表
                if (item.score && item.score.length > 0) {
                    item.score.forEach(scoreItem => {
                        tableHTML += `
                            <div class="list-item">${scoreItem}</div>
                        `;
                    });
                }
                
                tableHTML += `
                            </div>
                        </td>
                        <td class="image-cell">
                            <div class="list-container">
                `;
                
                // 显示图片
                if (item.imageUrl) {
                    tableHTML += `
                        <div class="list-item">
                            <img src="${item.imageUrl}" class="company-logo" onerror="this.onerror=null; this.src=''; this.innerHTML='<i class=\\'fas fa-building\\'></i>';" alt="公司logo">
                        </div>
                    `;
                } else {
                    tableHTML += `
                        <div class="list-item">
                            <div class="company-logo"><i class="fas fa-building"></i></div>
                        </div>
                    `;
                }
                
                tableHTML += `
                            </div>
                        </td>
                        <td class="name-cell">
                            <div class="list-container">
                `;
                
                // 遍历name列表
                if (item.name && item.name.length > 0) {
                    item.name.forEach(nameItem => {
                        tableHTML += `
                            <div class="list-item company-item">
                                <div class="company-name">${nameItem}</div>
                            </div>
                        `;
                    });
                }

                tableHTML += `
                            </div>
                        </td>
                        <td class="hitreason-cell">
                            <div class="list-container">
                `;

                // 遍历hitreason列表
                if (item.hitreason && item.hitreason.length > 0) {
                    item.hitreason.forEach(reason => {
                        tableHTML += `
                            <div class="list-item">${JSON.parse(reason).Field}:${JSON.parse(reason).Value}</div>
                        `;
                   });
                }
                
                tableHTML += `
                            </div>
                        </td>
                        <td class="hitreason-field-cell">
                            <div class="list-container">
                `;
                
                // 遍历hitreason列表
                if (item.hit_field && item.hit_field.length > 0) {
                    item.hit_field.forEach(reason => {
                        tableHTML += `
                            <div class="list-item">${reason.replace('"', '').replace('"', '').replace('"', '').replace('"', '')}</div>
                        `;
                   });
                }

                tableHTML += `
                            </div>
                        </td>
                        <td class="hitreason-value-cell">
                            <div class="list-container">
                `;

                // 遍历hitreason列表
                if (item.hit_value && item.hit_value.length > 0) {
                    item.hit_value.forEach(reason => {
                        tableHTML += `
                            <div class="list-item">${reason.replace('"', '').replace('"', '').replace('"', '').replace('"', '')}</div>
                        `;
                   });
                }
                
                tableHTML += `
                            </div>
                        </td>
                        <td class="hitreasons-cell">
                            <div class="list-container">
                `;
                
                // 遍历tags列表
                if (item.tags && item.tags.length > 0) {
                    item.tags.forEach(tag => {
                        tableHTML += `
                            <div class="list-item">${tag.replace('"', '').replace('"', '').replace('"', '').replace('"', '')}</div>
                        `;
                    });
                }
                tableHTML += `
                            </div>
                        </td>
                    </tr>
                `;
            });
            
            tableHTML += `
                    </tbody>
                </table>
            `;
            
            tableElement.innerHTML = tableHTML;
            
            // 处理高亮显示 - 所有列都应用高亮
            highlightAllElements(tableElement);
        }
        
        // 处理所有列的高亮显示
        function highlightAllElements(tableElement) {
            const listItems = tableElement.querySelectorAll('.list-item');
            listItems.forEach(item => {
                // 将<em>标签内容替换为高亮样式
                item.innerHTML = item.innerHTML.replace(
                    /<em>(.*?)<\/em>/g, 
                    '<span class="highlight">$1</span>'
                );
            });
        }
        
        // 获取当前时间（不含特殊符号）
        function getCurrentTime() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hour = String(now.getHours()).padStart(2, '0');
            const minute = String(now.getMinutes()).padStart(2, '0');
            const second = String(now.getSeconds()).padStart(2, '0');
            
            return `${year}${month}${day}${hour}${minute}${second}`;
        }
        
        // 直接保存到MySQL数据库
        function saveToMySQL(searchTerm, results1, results2) {
            // 显示保存状态
            const originalText = saveBtn.innerHTML;
            saveBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 保存中...';
            saveBtn.disabled = true;
            
            // 模拟数据库操作延迟
            setTimeout(() => {
                try {
                    // 在实际应用中，这里应该是直接连接MySQL数据库
                    const saveData = {
                        search_term: searchTerm,
                        api1_results: JSON.stringify(results1),
                        api2_results: JSON.stringify(results2),
                        save_time: getCurrentTime()
                    };
                    
                    // 模拟成功保存
                    console.log('保存到数据库的数据:', saveData);
                    
                    // 恢复按钮状态
                    saveBtn.innerHTML = originalText;
                    saveBtn.disabled = false;
                    
                    const totalResults = results1.length + results2.length;
                    showNotification(`成功保存搜索词 "${searchTerm}" 和 ${totalResults} 条结果到数据库`, 'success');
                    
                } catch (error) {
                    // 恢复按钮状态
                    saveBtn.innerHTML = originalText;
                    saveBtn.disabled = false;
                    
                    console.error('保存到数据库时出错:', error);
                    showNotification('保存到数据库时出错，请检查数据库连接', 'error');
                }
            }, 1500);
        }
        
        // 初始化页面
        document.addEventListener('DOMContentLoaded', function() {
            console.log('页面已加载，可独立配置两个环境的Header参数');
        });
    </script>
</body>
</html>
